<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ベビーモニター【最終安定版】</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 15px; background: #f0f2f5; color: #333; margin: 0; }
    .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin-left: auto; margin-right: auto; }
    button { padding: 15px 25px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; background: #007bff; color: white; font-weight: bold; }
    .btn-green { background: #28a745; }
    .btn-orange { background: #fd7e14; padding: 10px 20px; font-size: 14px; }
    input { padding: 15px; font-size: 20px; width: 150px; border: 2px solid #ddd; border-radius: 10px; text-align: center; margin-bottom: 10px; }
    #videoElement { width: 100%; max-width: 600px; background: #000; border-radius: 12px; margin-top: 10px; aspect-ratio: 4/3; }
    .id-box { background: #e3f2fd; padding: 15px; border-radius: 10px; font-weight: bold; color: #0d47a1; font-size: 32px; margin: 10px 0; border: 2px solid #bbdefb; }
    .log-area { background: #333; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 5px; text-align: left; height: 80px; overflow-y: auto; margin: 10px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="setupArea">
    <h2 style="color:#007bff;">👶 自家製モニター</h2>
    
    <div class="card">
      <h3>【送信】カメラ側にする</h3>
      <button onclick="startCamera()" class="btn-green">カメラを開始してID発行</button>
    </div>

    <div class="card">
      <h3>【受信】モニター側にする</h3>
      <input type="number" id="targetIdInput" placeholder="00000" inputmode="numeric">
      <br>
      <button onclick="startMonitor()">このスマホで見る</button>
    </div>
  </div>

  <div id="videoArea" class="hidden">
    <div id="cameraSideInfo">
      <p style="margin:0; font-size:13px; color:#666;">モニター側に入力する5桁：</p>
      <div id="myIdDisplay" class="id-box">取得中...</div>
      <button onclick="switchCamera()" class="btn-orange">カメラ前後切り替え</button>
    </div>
    
    <div class="log-area" id="debugLog">システム起動準備完了...</div>
    
    <button id="unmuteBtn" class="hidden" onclick="unmuteVideo()" style="background:#dc3545; width:100%;">タップして音声を出す</button>
    
    <video id="videoElement" autoplay playsinline muted></video>
    
    <br>
    <button onclick="location.reload()" style="background:#6c757d; margin-top:20px;">終了して戻る</button>
  </div>

  <script>
    let peer;
    let localStream;
    let currentFacingMode = "environment";
    const logEl = document.getElementById('debugLog');
    const videoEl = document.getElementById('videoElement');

    function addLog(msg) {
      const now = new Date();
      const time = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
      logEl.innerHTML += `[${time}] ${msg}<br>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    // カメラ起動
    async function startCamera() {
      const shortId = Math.floor(10000 + Math.random() * 90000).toString();
      addLog("Peerサーバに接続中...");
      
      // IDの衝突を避けるための接頭辞
      peer = new Peer("baby-" + shortId, {
        debug: 1,
        config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]}
      });
      
      peer.on('open', async (id) => {
        document.getElementById('myIdDisplay').innerText = shortId;
        addLog("ID登録完了: " + shortId);
        await openCamera(currentFacingMode);
        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('videoArea').classList.remove('hidden');
        addLog("接続待機中...");
      });

      peer.on('call', call => {
        addLog("モニターからの着信あり。応答します。");
        call.answer(localStream);
        call.on('stream', () => addLog("通信が確立しました！"));
      });

      peer.on('error', err => addLog("エラー: " + err.type));
    }

    async function openCamera(mode) {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: true });
        videoEl.srcObject = localStream;
        addLog("カメラ起動成功 (" + mode + ")");
      } catch (err) {
        addLog("カメラ失敗: " + err);
      }
    }

    async function switchCamera() {
      currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
      await openCamera(currentFacingMode);
    }

    // モニター起動
    function startMonitor() {
      const targetId = document.getElementById('targetIdInput').value.trim();
      if (!targetId) return alert("IDを入力してください");

      addLog("モニターモード起動中...");
      peer = new Peer({
        debug: 1,
        config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]}
      });

      peer.on('open', () => {
        addLog("サーバ接続完了。カメラ(ID:" + targetId + ")を呼び出します...");
        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('videoArea').classList.remove('hidden');
        document.getElementById('cameraSideInfo').classList.add('hidden');
        
        const call = peer.call("baby-" + targetId);
        
        call.on('stream', remoteStream => {
          addLog("映像データ受信！");
          videoEl.srcObject = remoteStream;
          videoEl.play();
          document.getElementById('unmuteBtn').classList.remove('hidden');
        });

        call.on('error', err => addLog("接続失敗: " + err));
      });
    }

    function unmuteVideo() {
      videoEl.muted = false;
      document.getElementById('unmuteBtn').classList.add('hidden');
      addLog("音声再生開始");
    }
  </script>
</body>
</html>
