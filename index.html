<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>自家製ベビーモニター（ID固定版）</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; color: #333; }
    .card { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin-left: auto; margin-right: auto; }
    button { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; }
    .btn-green { background: #28a745; }
    .btn-orange { background: #fd7e14; }
    input { padding: 15px; font-size: 16px; width: 80%; max-width: 300px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }
    #videoElement { width: 100%; max-width: 600px; background: black; border-radius: 8px; margin-top: 10px; }
    /* ID表示を強調 */
    .id-display-area { background: #ffeeba; padding: 15px; border-radius: 8px; font-weight: bold; color: #856404; font-size: 24px; margin: 10px 0; border: 2px solid #ffeeba; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="setupArea">
    <h2>自家製ベビーモニター</h2>
    
    <div class="card">
      <h3>① 赤ちゃん側に置く（カメラ）</h3>
      <button onclick="startCamera()">カメラを起動する</button>
    </div>

    <div class="card">
      <h3>② 手元で見る（モニター）</h3>
      <input type="text" id="targetIdInput" placeholder="カメラのIDを入力">
      <br>
      <button onclick="startMonitor()" class="btn-green">接続する</button>
    </div>
  </div>

  <div id="videoArea" class="hidden">
    <div id="cameraSideInfo">
      <p style="margin:0; font-size:14px;">モニター側に入力するID：</p>
      <div id="myIdDisplay" class="id-display-area">取得中...</div>
      <button onclick="switchCamera()" class="btn-orange" style="padding: 10px 20px; font-size: 14px;">カメラ切替</button>
    </div>
    
    <div id="statusText" style="margin: 10px 0; font-weight: bold;">接続中...</div>
    <video id="videoElement" autoplay playsinline></video>
    <br>
    <button onclick="location.reload()" style="background:#6c757d; margin-top:20px; padding: 10px;">終了する</button>
  </div>

  <script>
    let peer;
    let localStream;
    let currentFacingMode = "environment";
    const videoEl = document.getElementById('videoElement');
    const setupArea = document.getElementById('setupArea');
    const videoArea = document.getElementById('videoArea');
    const statusText = document.getElementById('statusText');
    const myIdDisplay = document.getElementById('myIdDisplay');

    async function startCamera() {
      if (!peer) peer = new Peer();
      
      peer.on('open', async id => {
        // IDを画面に表示
        myIdDisplay.innerText = id;
        
        await openCamera(currentFacingMode);
        
        setupArea.classList.add('hidden');
        videoArea.classList.remove('hidden');
        statusText.innerText = "カメラ待機中...";

        peer.on('call', call => {
          call.answer(localStream);
          statusText.innerText = "★モニターが接続しました";
        });
      });
    }

    async function openCamera(mode) {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: mode },
          audio: true
        });
        videoEl.srcObject = localStream;
        videoEl.muted = true;
      } catch (err) {
        alert("カメラ起動エラー: " + err);
      }
    }

    async function switchCamera() {
      currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
      await openCamera(currentFacingMode);
    }

    function startMonitor() {
      const targetId = document.getElementById('targetIdInput').value.trim();
      if (!targetId) return alert('IDを入力してください');

      peer = new Peer();
      peer.on('open', () => {
        setupArea.classList.add('hidden');
        videoArea.classList.remove('hidden');
        document.getElementById('cameraSideInfo').classList.add('hidden'); // モニター側ではID表示を隠す
        statusText.innerText = "接続中...";

        const call = peer.call(targetId);
        call.on('stream', remoteStream => {
          videoEl.srcObject = remoteStream;
          statusText.innerText = "LIVE配信中";
        });
      });
    }
  </script>
</body>
</html>
