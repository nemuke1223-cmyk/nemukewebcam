<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ベビーモニター【決定版】</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 10px; background: #f8f9fa; margin: 0; }
    .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 400px; margin-left: auto; margin-right: auto; }
    button { padding: 15px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; background: #007bff; color: white; font-weight: bold; width: 90%; }
    input { padding: 15px; font-size: 24px; width: 150px; border: 2px solid #ddd; border-radius: 10px; text-align: center; }
    #videoElement { width: 100%; max-width: 600px; background: #000; border-radius: 10px; margin-top: 10px; }
    .id-display { background: #fff3cd; padding: 15px; border-radius: 10px; font-weight: bold; color: #856404; font-size: 36px; margin: 10px 0; border: 2px solid #ffeeba; }
    #log { font-size: 11px; color: #666; text-align: left; padding: 10px; height: 60px; overflow-y: auto; background: #eee; border-radius: 5px; margin: 10px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="setupArea">
    <h2 style="color:#007bff;">👶 ベビーモニター</h2>
    <div class="card">
      <p>古いスマホはこちら</p>
      <button onclick="initCameraMode()" style="background:#28a745;">①カメラを起動する</button>
    </div>
    <div class="card">
      <p>確認用スマホはこちら</p>
      <input type="number" id="targetIdInput" placeholder="00000" inputmode="numeric">
      <button onclick="initMonitorMode()">②このスマホで見る</button>
    </div>
  </div>

  <div id="videoArea" class="hidden">
    <div id="cameraHeader">
      <p style="margin:0; font-size:12px;">モニター側に入力する数字：</p>
      <div id="myIdDisplay" class="id-display">接続中...</div>
    </div>
    <div id="log">システム起動中...</div>
    <video id="videoElement" autoplay playsinline muted></video>
    <button id="unmuteBtn" class="hidden" onclick="unmute()" style="background:#dc3545; margin-top:10px;">映像と音を出す</button>
    <button onclick="location.reload()" style="background:#6c757d; margin-top:20px; width:50%; font-size:12px;">終了</button>
  </div>

  <script>
    let peer, localStream;
    const logEl = document.getElementById('log');
    const videoEl = document.getElementById('videoElement');

    function addLog(m) { logEl.innerHTML += m + "<br>"; logEl.scrollTop = logEl.scrollHeight; }

    // 【最重要】カメラモード：先にカメラを掴んでからPeerを作る
    async function initCameraMode() {
      addLog("カメラ準備中...");
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
        videoEl.srcObject = localStream;
        addLog("カメラOK。サーバ接続中...");
        
        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('videoArea').classList.remove('hidden');

        // 5桁のIDを生成
        const shortId = Math.floor(10000 + Math.random() * 90000).toString();
        peer = new Peer(shortId, {
          config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (id) => {
          document.getElementById('myIdDisplay').innerText = id;
          addLog("待機完了。ID: " + id);
        });

        peer.on('call', (call) => {
          addLog("着信！接続します...");
          call.answer(localStream);
        });
        
        peer.on('error', (e) => addLog("エラー: " + e.type));
      } catch (e) { alert("カメラ起動失敗: " + e); }
    }

    // モニターモード
    function initMonitorMode() {
      const tid = document.getElementById('targetIdInput').value;
      if (!tid) return alert("IDを入力してください");

      addLog("接続準備中...");
      peer = new Peer({ config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });

      peer.on('open', () => {
        addLog("カメラ(ID:" + tid + ")に接続します...");
        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('videoArea').classList.remove('hidden');
        document.getElementById('cameraHeader').classList.add('hidden');
        
        const call = peer.call(tid);
        call.on('stream', (rem) => {
          addLog("映像を受信しました！");
          videoEl.srcObject = rem;
          document.getElementById('unmuteBtn').classList.remove('hidden');
          videoEl.play();
        });
        call.on('error', (e) => addLog("接続エラー: " + e));
      });
    }

    function unmute() {
      videoEl.muted = false;
      videoEl.play();
      document.getElementById('unmuteBtn').classList.add('hidden');
      addLog("再生中");
    }
  </script>
</body>
</html>
