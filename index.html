<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ベビーモニター</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
    button { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; }
    input { padding: 15px; font-size: 16px; width: 80%; max-width: 300px; margin-bottom: 10px; }
    #videoElement { width: 100%; max-width: 600px; background: black; border-radius: 8px; margin-top: 20px; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="setupArea">
    <h2>自家製ベビーモニター</h2>
    
    <div style="background: #e9ecef; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
      <h3>赤ちゃん側に置く（古いスマホ）</h3>
      <button onclick="startCamera()">カメラを起動する</button>
      <p id="myIdDisplay" style="font-weight: bold; color: #d9534f; font-size: 20px;"></p>
    </div>

    <div style="background: #e9ecef; padding: 20px; border-radius: 8px;">
      <h3>手元で見る（確認用スマホ）</h3>
      <input type="text" id="targetIdInput" placeholder="カメラのIDを入力">
      <br>
      <button onclick="startMonitor()" style="background: #28a745;">接続する</button>
    </div>
  </div>

  <div id="videoArea" class="hidden">
    <p id="statusText">接続中...</p>
    <video id="videoElement" autoplay playsinline></video>
  </div>

  <script>
    let peer;
    const videoEl = document.getElementById('videoElement');
    const setupArea = document.getElementById('setupArea');
    const videoArea = document.getElementById('videoArea');
    const statusText = document.getElementById('statusText');

    // ▼ カメラ側（古いスマホ）の処理
    function startCamera() {
      peer = new Peer(); // PeerJSの初期化（IDは自動生成される）
      
      peer.on('open', id => {
        document.getElementById('myIdDisplay').innerText = "このカメラのID: " + id;
        
        // カメラとマイクの取得を要求
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
          .then(stream => {
            // 取得した映像を画面に表示
            videoEl.srcObject = stream;
            videoEl.muted = true; // ★自分側のハウリング防止のためミュート
            
            setupArea.classList.add('hidden');
            videoArea.classList.remove('hidden');
            statusText.innerText = "監視中...（ID: " + id + "）";

            // モニター側からの着信を待機
            peer.on('call', call => {
              call.answer(stream); // 着信があったらカメラの映像を送り返す
            });
          })
          .catch(err => {
            alert('カメラの起動に失敗しました。権限を許可してください。');
            console.error(err);
          });
      });
    }

    // ▼ モニター側（確認用スマホ）の処理
    function startMonitor() {
      const targetId = document.getElementById('targetIdInput').value.trim();
      if (!targetId) return alert('カメラのIDを入力してください');

      peer = new Peer();
      
      peer.on('open', () => {
        setupArea.classList.add('hidden');
        videoArea.classList.remove('hidden');
        statusText.innerText = "カメラに接続しています...";

        // カメラ側のIDに対して発信（映像要求のみなので自分のストリームは送らない）
        const call = peer.call(targetId);
        
        // カメラ側から映像が送られてきたら表示する
        call.on('stream', remoteStream => {
          videoEl.srcObject = remoteStream;
          statusText.innerText = "接続完了";
        });

        call.on('error', err => {
          alert('接続エラー: ' + err);
        });
      });
    }
  </script>
</body>
</html>
